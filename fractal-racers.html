    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{overflow:hidden;background:#000;font-family:'Orbitron',monospace;color:#fff;cursor:crosshair}

        .hp{background:rgba(0,8,20,.82);border:1px solid rgba(0,255,255,.35);border-radius:6px;padding:10px 16px;box-shadow:0 0 18px rgba(0,255,255,.2)}

        #bl{font-size:.55rem;letter-spacing:4px;color:#00ffff}
        #bw{width:260px;height:10px;border:1px solid rgba(0,255,255,.4);border-radius:999px;overflow:hidden;background:rgba(0,30,50,.6)}
        #bb{width:0%;height:100%;background:linear-gradient(90deg,#00ffff,#ffcc33);transition:width .08s linear}
        #sc{position:absolute;bottom:65px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:4px}

        #sw{width:160px;height:7px;border:1px solid rgba(255,204,51,.3);border-radius:999px;overflow:hidden;background:rgba(40,25,0,.6)}
        #sb{width:0%;height:100%;background:linear-gradient(90deg,#ff8800,#ffcc33);transition:width .1s linear}
        #kf{position:absolute;right:20px;top:120px;display:flex;flex-direction:column;gap:4px}
        .ki{font-size:.7rem;color:#ff4466;text-align:right;text-shadow:0 0 6px #ff4466;animation:kfa 2.5s forwards}
        .ki.gold{color:#ffcc33;text-shadow:0 0 8px #ffcc33;font-size:.78rem}
        .ki.orange{color:#ff8800;text-shadow:0 0 8px #ff8800;font-size:.85rem}
        .ki.magenta{color:#ff00ff;text-shadow:0 0 8px #ff00ff;font-size:.92rem}
        @keyframes kfa{0%{opacity:1;transform:translateX(0)}80%{opacity:1}100%{opacity:0;transform:translateX(20px)}}
        #cm{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:60;font-size:2.4rem;font-weight:900;letter-spacing:4px;text-align:center;text-shadow:0 0 20px rgba(0,255,255,.9);opacity:0;transition:opacity .3s ease;pointer-events:none}
        #ov{position:fixed;inset:0;z-index:80;background:rgba(0,0,8,.92);display:flex;flex-direction:column;justify-content:center;align-items:center;gap:20px;opacity:0;pointer-events:none;transition:opacity .5s}
        #ov.active{opacity:1;pointer-events:all}
        #ov h1{font-size:3rem;font-weight:900;letter-spacing:6px;color:#00ffff;text-shadow:0 0 30px #00ffff}
        #ov .sub{font-size:.9rem;color:#888;letter-spacing:3px}
        #ov .fs{font-size:1.6rem;color:#ffcc33;text-shadow:0 0 14px #ffcc33}
        #ov .fsc2{font-size:1rem;color:#ff88aa;text-shadow:0 0 8px #ff88aa}
        #rb{margin-top:10px;padding:14px 36px;background:transparent;border:2px solid #00ffff;color:#00ffff;font-family:'Orbitron',monospace;font-size:.9rem;letter-spacing:3px;cursor:pointer;transition:all .2s}
        #rb:hover{background:#00ffff;color:#000}
        #fo{position:fixed;inset:0;pointer-events:none;z-index:50;background:rgba(255,0,0,0);transition:background .1s ease}
        #wa{position:fixed;inset:0;pointer-events:none;z-index:45;border:3px solid transparent}
        #wa.active{border-color:rgba(255,0,60,.7);animation:wp .5s infinite alternate}
        @keyframes wp{from{box-shadow:inset 0 0 40px rgba(255,0,60,.2)}to{box-shadow:inset 0 0 80px rgba(255,0,60,.4)}}
        #fb{position:fixed;bottom:20px;right:20px;z-index:100;background:rgba(0,8,20,.8);border:1px solid rgba(0,255,255,.3);color:#00ffff;font-family:'Orbitron',monospace;font-size:.65rem;padding:6px 10px;cursor:pointer;border-radius:4px;pointer-events:all}
        #dw{position:fixed;top:14px;right:20px;z-index:100;pointer-events:all}
        #di{background:rgba(0,8,20,.82);color:#00ffff;border:1px solid rgba(0,255,255,.35);font-family:'Orbitron',monospace;font-size:.65rem;padding:6px 10px;border-radius:4px;cursor:pointer}
        #ptbar{position:fixed;top:60px;left:50%;transform:translateX(-50%);font-size:.6rem;letter-spacing:3px;color:#00ffff;text-shadow:0 0 8px #00ffff;pointer-events:none;z-index:25;background:rgba(0,8,20,.7);padding:4px 10px;border-radius:4px;border:1px solid rgba(0,255,255,.2);display:none}
        #mm{position:fixed;bottom:60px;left:14px;border:1px solid rgba(0,255,255,.3);border-radius:50%;background:rgba(0,8,20,.75);pointer-events:none;z-index:30}
        #radar{position:fixed;inset:0;pointer-events:none;z-index:25}


        #siteNavWrap{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:210;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:all}
        #siteMiniBrand{font-size:.55rem;letter-spacing:3px;color:rgba(0,255,255,.42);text-shadow:0 0 6px rgba(0,255,255,.25);white-space:nowrap;pointer-events:none}
        #siteNav{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
        .navTab{background:rgba(0,8,20,.76);border:1px solid rgba(0,255,255,.28);color:#00ffff;font-family:'Orbitron',monospace;font-size:.58rem;padding:6px 10px;border-radius:4px;text-decoration:none;letter-spacing:1.4px;transition:all .18s ease}
        .navTab:hover{background:rgba(0,255,255,.12);border-color:rgba(0,255,255,.5);transform:translateY(-1px)}
        .navTab.active{color:#ffcc33;border-color:rgba(255,204,51,.45);background:rgba(255,204,51,.08)}
        #llcFooter{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);z-index:210;font-family:'Orbitron',monospace;font-size:.55rem;color:rgba(0,255,255,.35);letter-spacing:2px;pointer-events:none;white-space:nowrap}
        @media (max-width: 900px){
            #siteNavWrap{top:10px;gap:5px;max-width:calc(100vw - 140px)}
            #siteMiniBrand{display:none}
            #siteNav{gap:6px}
            .navTab{font-size:.52rem;padding:5px 8px}
            #llcFooter{font-size:.48rem;bottom:4px;max-width:calc(100vw - 20px);text-align:center}
        }
        @media (max-width: 640px){
            #siteNavWrap{left:50%;transform:translateX(-50%);top:8px;max-width:calc(100vw - 150px)}
            #siteNav{display:grid;grid-template-columns:repeat(2,max-content);justify-content:center}
        }
        @keyframes pt{from{opacity:.7}to{opacity:1;transform:scale(1.05)}}
    </style>

<script>
var CFG={world:{sphereRadius:100,surfaceRadius:97.5},player:{maxSpeed:.64,reverseSpeed:.22,accelSharpness:4.5,turnSharpness:6,maxTurnRate:2.4,bankingAmount:1.2,bankingSharpness:7,maxHealth:100},boost:{max:100,drainPerSecond:26,gainPerPickup:8,extraSpeed:.45},camera:{height:22,distance:38,positionLerp:.07,lookLerp:.10,baseFov:88,speedFovBoost:10,boostFovBonus:8},game:{startProgressGoal:10,levelGoalIncrease:3},pickups:{count:12,collectDistance:4},enemies:{beginner:2,intermediate:4,expert:6,collisionDistance:5},missiles:{speed:.55,damage:18,lifeTime:5,fireInterval:{beginner:5,intermediate:3.2,expert:2}},lightWall:{damage:8,segmentLife:10,maxTotal:100},fx:{speedLineCount:150}};
var G={};
function initG(){G={time:0,lastTime:performance.now(),score:0,level:1,progress:0,progressGoal:CFG.game.startProgressGoal,health:CFG.player.maxHealth,kills:0,boostMeter:0,shieldTimer:0,shockwaveCharge:0,shockwaveReady:false,speedLines:null,cameraLookTarget:new THREE.Vector3(),over:false,invincible:0,screenShake:0,combo:1,comboTimer:0,maxCombo:1,playerMissileCD:0,rapidFireTimer:0};}
var keys={};

var scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000814,.0028);
var camera=new THREE.PerspectiveCamera(74,innerWidth/innerHeight,.5,1200);
var renderer=new THREE.WebGLRenderer({antialias:false,powerPreference:"high-performance"});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(1);
renderer.setClearColor(0x000814);
document.body.appendChild(renderer.domElement);

var composer=new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene,camera));
var bloomPass=new THREE.UnrealBloomPass(new THREE.Vector2(Math.floor(innerWidth*.5),Math.floor(innerHeight*.5)),1.05,.5,.2);
composer.addPass(bloomPass);

var worldGroup=new THREE.Group(),fxGroup=new THREE.Group(),pickupGroup=new THREE.Group(),enemyGroup=new THREE.Group(),missileGroup=new THREE.Group();
scene.add(worldGroup,fxGroup,pickupGroup,enemyGroup,missileGroup);

scene.add(new THREE.AmbientLight(0x1a2e44,.9));
var rimLight=new THREE.DirectionalLight(0x66eaff,1.8);rimLight.position.set(40,80,30);scene.add(rimLight);
var accentLight=new THREE.PointLight(0xffcc33,.7,200);accentLight.position.set(-50,40,-30);scene.add(accentLight);
var playerSpot=new THREE.SpotLight(0xffffff,1.6,70,Math.PI/7,.5);scene.add(playerSpot,playerSpot.target);

var sphereMat=new THREE.MeshPhongMaterial({color:0x000c18,emissive:0x001a2a,emissiveIntensity:.5,side:THREE.BackSide,shininess:10});
worldGroup.add(new THREE.Mesh(new THREE.SphereGeometry(CFG.world.sphereRadius,40,40),sphereMat));
var gridMat=new THREE.LineBasicMaterial({color:0x2fd6ff,transparent:true,opacity:.2});
var GS=20;
for(var gi=0;gi<=GS;gi++){var phi0=(gi/GS)*Math.PI,gp=[];for(var gj=0;gj<=60;gj++){var t0=(gj/60)*Math.PI*2;gp.push(new THREE.Vector3(CFG.world.sphereRadius*Math.sin(phi0)*Math.cos(t0),CFG.world.sphereRadius*Math.cos(phi0),CFG.world.sphereRadius*Math.sin(phi0)*Math.sin(t0)));}worldGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(gp),gridMat));}
for(var gi=0;gi<GS;gi++){var t0=(gi/GS)*Math.PI*2,gp=[];for(var gj=0;gj<=60;gj++){var p0=(gj/60)*Math.PI;gp.push(new THREE.Vector3(CFG.world.sphereRadius*Math.sin(p0)*Math.cos(t0),CFG.world.sphereRadius*Math.cos(p0),CFG.world.sphereRadius*Math.sin(p0)*Math.sin(t0)));}worldGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(gp),gridMat));}

var sGeo=new THREE.BufferGeometry(),spArr=new Float32Array(1200*3);
for(var si=0;si<1200;si++){var r=500+Math.random()*600,a=Math.random()*Math.PI*2,b=Math.acos(2*Math.random()-1);spArr[si*3]=r*Math.sin(b)*Math.cos(a);spArr[si*3+1]=r*Math.cos(b);spArr[si*3+2]=r*Math.sin(b)*Math.sin(a);}
sGeo.setAttribute("position",new THREE.BufferAttribute(spArr,3));
var stars=new THREE.Points(sGeo,new THREE.PointsMaterial({color:0xffffff,size:1.2,transparent:true,opacity:.7}));scene.add(stars);

var _v1=new THREE.Vector3(),_v2=new THREE.Vector3(),_v3=new THREE.Vector3();
var _q1=new THREE.Quaternion(),_m1=new THREE.Matrix4(),_axZ=new THREE.Vector3(0,0,1);
var _fr={pos:new THREE.Vector3(),up:new THREE.Vector3(),right:new THREE.Vector3(),forward:new THREE.Vector3()};

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function wrapT(t){var p=Math.PI*2,r=t%p;return r<0?r+p:r;}
function h2s(h){return((h>>16)&255)+","+(((h>>8)&255))+","+(h&255);}

function sPos(theta,phi,radius,out){
    if(radius===undefined)radius=CFG.world.surfaceRadius;
    if(!out)out=new THREE.Vector3();
    return out.set(radius*Math.sin(phi)*Math.cos(theta),radius*Math.cos(phi),radius*Math.sin(phi)*Math.sin(theta));
}

function tFrame(theta,phi,heading){
    sPos(theta,phi,CFG.world.surfaceRadius,_fr.pos);
    _fr.up.copy(_fr.pos).normalize();
    _v1.set(-Math.sin(phi)*Math.sin(theta),0,Math.sin(phi)*Math.cos(theta)).normalize();
    _v2.set(Math.cos(phi)*Math.cos(theta),-Math.sin(phi),Math.cos(phi)*Math.sin(theta)).normalize();
    _fr.forward.copy(_v1).multiplyScalar(Math.cos(heading));
    _v3.copy(_v2).multiplyScalar(Math.sin(heading));
    _fr.forward.add(_v3).normalize();
    _fr.right.crossVectors(_fr.forward,_fr.up).normalize();
    _fr.forward.crossVectors(_fr.up,_fr.right).normalize();
    return _fr;
}

function placeOS(obj,theta,phi,heading,bank){
    bank=bank||0;
    var f=tFrame(theta,phi,heading);
    obj.position.copy(f.pos);
    _m1.makeBasis(f.right,f.up,f.forward);
    _q1.setFromRotationMatrix(_m1);
    if(bank!==0)_q1.multiply(new THREE.Quaternion().setFromAxisAngle(_axZ,bank));
    obj.quaternion.copy(_q1);
    return f;
}

var TP=70,tPos=new Float32Array(TP*3),tLife=new Float32Array(TP),tHead=0;
for(var i=0;i<TP;i++){tPos[i*3]=9999;tPos[i*3+1]=9999;tPos[i*3+2]=9999;}
var tGeo=new THREE.BufferGeometry();tGeo.setAttribute("position",new THREE.BufferAttribute(tPos,3));
var tMat=new THREE.PointsMaterial({color:0x00ffff,size:2.2,transparent:true,opacity:.65,sizeAttenuation:true});
scene.add(new THREE.Points(tGeo,tMat));
function addTrail(pos,boost){var i=tHead%TP;tPos[i*3]=pos.x;tPos[i*3+1]=pos.y;tPos[i*3+2]=pos.z;tLife[i]=.8;tHead++;tMat.color.set(boost?0xffcc33:0x00ffff);tGeo.attributes.position.needsUpdate=true;}
function updTrails(dt){for(var i=0;i<TP;i++){if(tLife[i]>0){tLife[i]-=dt;if(tLife[i]<=0){tPos[i*3]=9999;tPos[i*3+1]=9999;tPos[i*3+2]=9999;}}}tGeo.attributes.position.needsUpdate=true;}

var EP=50,ePos=new Float32Array(EP*3),eLife=new Float32Array(EP),eHead=0;
for(var i=0;i<EP;i++){ePos[i*3]=9999;ePos[i*3+1]=9999;ePos[i*3+2]=9999;}
var eGeo=new THREE.BufferGeometry();eGeo.setAttribute("position",new THREE.BufferAttribute(ePos,3));
scene.add(new THREE.Points(eGeo,new THREE.PointsMaterial({color:0xff3366,size:1.8,transparent:true,opacity:.5,sizeAttenuation:true})));
function addETrail(pos){var i=eHead%EP;ePos[i*3]=pos.x;ePos[i*3+1]=pos.y;ePos[i*3+2]=pos.z;eLife[i]=.6;eHead++;eGeo.attributes.position.needsUpdate=true;}
function updETrails(dt){for(var i=0;i<EP;i++){if(eLife[i]>0){eLife[i]-=dt;if(eLife[i]<=0){ePos[i*3]=9999;ePos[i*3+1]=9999;ePos[i*3+2]=9999;}}}eGeo.attributes.position.needsUpdate=true;}

var WM=CFG.lightWall.maxTotal,wPos=new Float32Array(WM*3),wLife=new Float32Array(WM),wOwner=new Uint8Array(WM),wHead=0;
var wColl=[];for(var i=0;i<WM;i++){wPos[i*3]=9999;wPos[i*3+1]=9999;wPos[i*3+2]=9999;wColl.push(new THREE.Vector3(9999,9999,9999));}
var wGeo=new THREE.BufferGeometry();wGeo.setAttribute("position",new THREE.BufferAttribute(wPos,3));
var wMat=new THREE.PointsMaterial({color:0xff3366,size:3.5,transparent:true,opacity:.8,sizeAttenuation:true});
scene.add(new THREE.Points(wGeo,wMat));
function spawnWall(pos,col,isP){var i=wHead%WM;wPos[i*3]=pos.x;wPos[i*3+1]=pos.y;wPos[i*3+2]=pos.z;wLife[i]=CFG.lightWall.segmentLife;wOwner[i]=isP?1:2;wColl[i].copy(pos);wHead++;wMat.color.set(col);wGeo.attributes.position.needsUpdate=true;}
function updWalls(dt){for(var i=0;i<WM;i++){if(wLife[i]>0){wLife[i]-=dt;if(wLife[i]<=0){wPos[i*3]=9999;wPos[i*3+1]=9999;wPos[i*3+2]=9999;wColl[i].set(9999,9999,9999);}}}wGeo.attributes.position.needsUpdate=true;}
function checkWalls(){if(G.invincible>0||G.over)return;var px=player.mesh.position.x,py=player.mesh.position.y,pz=player.mesh.position.z;for(var i=0;i<WM;i++){if(wLife[i]>0&&wOwner[i]===2){var dx=px-wColl[i].x,dy=py-wColl[i].y,dz=pz-wColl[i].z;if(dx*dx+dy*dy+dz*dz<7){takeDamage(3,"255,60,60");break;}}}}

var XM=60,xPos=new Float32Array(XM*3),xVel=[],xLife=0;
for(var i=0;i<XM;i++){xPos[i*3]=9999;xPos[i*3+1]=9999;xPos[i*3+2]=9999;xVel.push(new THREE.Vector3());}
var xGeo=new THREE.BufferGeometry();xGeo.setAttribute("position",new THREE.BufferAttribute(xPos,3));
var xMat=new THREE.PointsMaterial({color:0xffcc33,size:1.4,transparent:true,opacity:0,sizeAttenuation:true});
scene.add(new THREE.Points(xGeo,xMat));
function spawnExp(pos,col){xMat.color.set(col);xMat.opacity=1;xLife=.9;for(var i=0;i<XM;i++){xPos[i*3]=pos.x;xPos[i*3+1]=pos.y;xPos[i*3+2]=pos.z;xVel[i].set(Math.random()*2-1,Math.random()*2-1,Math.random()*2-1).normalize().multiplyScalar(12+Math.random()*10);}xGeo.attributes.position.needsUpdate=true;}
function updExp(dt){if(xLife<=0)return;xLife-=dt;xMat.opacity=Math.max(0,xLife/.9);for(var i=0;i<XM;i++){xPos[i*3]+=xVel[i].x*dt;xPos[i*3+1]+=xVel[i].y*dt;xPos[i*3+2]+=xVel[i].z*dt;}xGeo.attributes.position.needsUpdate=true;}

var SM=100,swP=new Float32Array(SM*3),swV=[],swL=0;
for(var i=0;i<SM;i++){swP[i*3]=9999;swP[i*3+1]=9999;swP[i*3+2]=9999;swV.push(new THREE.Vector3());}

function findNearestEnemy(){
    var best=-1,bestD=Infinity;
    for(var i=0;i<enemies.length;i++){var d=player.mesh.position.distanceTo(enemies[i].mesh.position);if(d<80&&d<bestD){bestD=d;best=i;}}
    return best;

function firePlayerMissile(){
    if(G.playerMissileCD>0||enemies.length===0)return;
    var ti=findNearestEnemy();
    if(ti<0)return;
    for(var i=0;i<PMM;i++){
        var s=pmPool[i];
        if(!s.active){
            s.active=true;s.mesh.visible=true;
            s.mesh.position.copy(player.mesh.position);
            s.life=5;s.targetIdx=ti;
            _v1.copy(enemies[ti].mesh.position).sub(player.mesh.position).normalize();
            s.vel.copy(_v1).multiplyScalar(.7);
            G.playerMissileCD=G.rapidFireTimer>0?0.6:1.2;
            sfxFire();
            break;
        }
    }
}

function updPlayerMissiles(dt){
    for(var i=0;i<PMM;i++){
        var m=pmPool[i];
        if(!m.active)continue;
        m.life-=dt;
        // Re-target if target died
        if(m.targetIdx<0||m.targetIdx>=enemies.length){m.targetIdx=findNearestEnemy();}
        if(m.targetIdx>=0&&m.targetIdx<enemies.length){
            _v1.copy(enemies[m.targetIdx].mesh.position).sub(m.mesh.position).normalize().multiplyScalar(.7);
            m.vel.lerp(_v1,dt*2.5);
        }
        _v2.copy(m.vel).multiplyScalar(dt*60);
        m.mesh.position.add(_v2);
        // Check hits on enemies
        var hit=false;
        for(var ei=enemies.length-1;ei>=0;ei--){
            var d=m.mesh.position.distanceTo(enemies[ei].mesh.position);
            if(d<5){
                var dmg=G.rapidFireTimer>0?2:1;
                enemies[ei].health-=dmg;
                spawnExp(m.mesh.position,0x00ffff);
                flashScreen(.12,"0,200,255");
                if(enemies[ei].health<=0){destroyEnemy(ei);if(m.targetIdx===ei)m.targetIdx=-1;else if(m.targetIdx>ei)m.targetIdx--;}
                m.active=false;m.mesh.visible=false;hit=true;break;
            }
        }
        if(!hit&&m.life<=0){m.active=false;m.mesh.visible=false;}
    }
}

function destroyEnemy(idx){
    var e=enemies[idx];
    spawnExp(e.mesh.position,e.col);
    // Combo logic
    G.combo=Math.min(G.combo+1,8);
    G.comboTimer=2.5;
    if(G.combo>G.maxCombo)G.maxCombo=G.combo;
    var pts=(e.isBoss?100:30)*G.combo;
    G.kills++;G.score+=pts;
    // Kill feed with combo tier
    var msg,tier="";
    if(e.isBoss){msg="BOSS DOWN +"+pts;}
    else if(G.combo===2){msg="DOUBLE KILL x2 +"+pts;tier="gold";}
    else if(G.combo===3){msg="TRIPLE KILL x3 +"+pts;tier="orange";}
    else if(G.combo===4){msg="QUAD x4 +"+pts;tier="magenta";}
    else if(G.combo>=5){msg="OVERKILL x"+G.combo+" +"+pts;tier="magenta";}
    else{msg="ENEMY DOWN +"+pts;}
    addKF(msg,tier);
    enemyGroup.remove(e.mesh);enemies.splice(idx,1);
    // Fix pmPool target indices after splice
    for(var i=0;i<PMM;i++){if(pmPool[i].active){if(pmPool[i].targetIdx===idx)pmPool[i].targetIdx=-1;else if(pmPool[i].targetIdx>idx)pmPool[i].targetIdx--;}}
    if(enemies.length<eCount())setTimeout(function(){if(!G.over)createEnemy(ECOLS[Math.floor(Math.random()*ECOLS.length)],Math.random()*Math.PI*2);},3000);
    updHUD();
}

    for(var i=0;i<WM;i++){wPos[i*3]=9999;wPos[i*3+1]=9999;wPos[i*3+2]=9999;wLife[i]=0;wColl[i].set(9999,9999,9999);}
    wGeo.attributes.position.needsUpdate=true;
    for(var i=0;i<TP;i++){tPos[i*3]=9999;tPos[i*3+1]=9999;tPos[i*3+2]=9999;tLife[i]=0;}
    tGeo.attributes.position.needsUpdate=true;
    player.theta=0;player.phi=Math.PI/2;player.heading=0;player.speed=0;player.turnVelocity=0;player.bank=0;
    initG();createSpeedLines();setTheme();resetPickups();resetEnemies();
    player.frame=placeOS(player.mesh,player.theta,player.phi,player.heading,player.bank);
    G.cameraLookTarget.copy(player.mesh.position);
    showCM("FRACTAL RACERS");updHUD();
}

window.addEventListener("keydown",function(e){keys[e.code]=true;if(e.code==="Space")e.preventDefault();startAudio();});
window.addEventListener("keyup",function(e){keys[e.code]=false;});
window.addEventListener("pointerdown",startAudio,{once:true});
function onDiffChange(){resetEnemies();}
function toggleFS(){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}

function updPlayer(dt){
    if(G.over)return;
    var ts=0;if(keys["ArrowUp"]||keys["KeyW"])ts=CFG.player.maxSpeed;else if(keys["ArrowDown"]||keys["KeyS"])ts=-CFG.player.reverseSpeed;
    player.boosting=false;if((keys["ShiftLeft"]||keys["ShiftRight"])&&G.boostMeter>0&&ts>0){ts+=CFG.boost.extraSpeed;player.boosting=true;G.boostMeter=clamp(G.boostMeter-CFG.boost.drainPerSecond*dt,0,CFG.boost.max);}
    player.speed=THREE.MathUtils.lerp(player.speed,ts,CFG.player.accelSharpness*dt);
    var ti=0;if(keys["ArrowLeft"]||keys["KeyA"])ti-=1;if(keys["ArrowRight"]||keys["KeyD"])ti+=1;
    player.turnVelocity=THREE.MathUtils.lerp(player.turnVelocity,ti*CFG.player.maxTurnRate,CFG.player.turnSharpness*dt);
    player.heading+=player.turnVelocity*dt;
    var tT=Math.cos(player.heading),tP=Math.sin(player.heading),lf=Math.max(.25,Math.sin(player.phi));
    player.theta+=(player.speed*tT*dt*2.75)/lf;player.phi+=player.speed*tP*dt*2.1;
    player.theta=wrapT(player.theta);player.phi=clamp(player.phi,.18,Math.PI-.18);
    player.bank=THREE.MathUtils.lerp(player.bank,clamp(-player.turnVelocity*CFG.player.bankingAmount,-.92,.92),CFG.player.bankingSharpness*dt);
    player.frame=placeOS(player.mesh,player.theta,player.phi,player.heading,player.bank);
    player.mesh.userData.bm.uniforms.t.value=G.time*(player.boosting?2:1);
    if(Math.abs(player.speed)>.04&&Math.random()<.55)addTrail(player.mesh.position,player.boosting);
    if(Math.abs(player.speed)>.3&&Math.random()<dt*3.5)spawnWall(player.mesh.position,player.boosting?0xffcc33:0x00ffff,true);
    if(keys["Space"]&&G.shockwaveReady){triggerShockwave();keys["Space"]=false;}
    if(keys["KeyF"]){firePlayerMissile();keys["KeyF"]=false;}
    if(G.playerMissileCD>0)G.playerMissileCD-=dt;
    if(G.shockwaveCooldown>0)G.shockwaveCooldown-=dt;else{G.shockwaveCharge=clamp(G.shockwaveCharge+dt*10,0,100);if(G.shockwaveCharge>=100){G.shockwaveReady=true;G.shockwaveCharge=100;}}
    if(G.shieldTimer>0){G.shieldTimer-=dt;shMesh.visible=true;G.invincible=.1;}else{shMesh.visible=false;}
    if(G.rapidFireTimer>0)G.rapidFireTimer-=dt;
    if(G.invincible>0)G.invincible-=dt;if(G.screenShake>0)G.screenShake-=dt;
    // Combo timer
    if(G.comboTimer>0){G.comboTimer-=dt;if(G.comboTimer<=0){G.combo=1;updHUD();}}
}

function updEnemies(dt){
    for(var ei=0;ei<enemies.length;ei++){
        var e=enemies[ei];
        var dT=player.theta-e.theta;if(dT>Math.PI)dT-=Math.PI*2;if(dT<-Math.PI)dT+=Math.PI*2;
        var dP=player.phi-e.phi,dH=Math.atan2(dP,dT)-e.heading;
        while(dH>Math.PI)dH-=Math.PI*2;while(dH<-Math.PI)dH+=Math.PI*2;
        var agg=1.3+G.level*.18+(diffKey()==="expert"?.4:0);
        e.heading+=dH*dt*agg;
        var ts=(e.isBoss?.22:.18)+G.level*.014+(diffKey()==="expert"?.06:0);
        e.speed=THREE.MathUtils.lerp(e.speed,ts,1.3*dt);
        var tT=Math.cos(e.heading),tP=Math.sin(e.heading),lf=Math.max(.25,Math.sin(e.phi));
        e.theta+=(e.speed*tT*dt*2.3)/lf;e.phi+=e.speed*tP*dt*1.8;
        e.theta=wrapT(e.theta);e.phi=clamp(e.phi,.2,Math.PI-.2);
        e.bank=THREE.MathUtils.lerp(e.bank,clamp(-dH*.9,-.72,.72),4.5*dt);
        placeOS(e.mesh,e.theta,e.phi,e.heading,e.bank);
        e.mesh.userData.bm.uniforms.t.value=G.time*.9;
        if(Math.random()<.15)addETrail(e.mesh.position);
        e.wTimer-=dt;if(e.wTimer<=0&&e.speed>.1){e.wTimer=.25+Math.random()*.12;spawnWall(e.mesh.position,e.col,false);}
        e.mTimer-=dt;if(e.mTimer<=0){if(e.mesh.position.distanceTo(player.mesh.position)<70){fireMissile(e);e.mTimer=mInt()*(.8+Math.random()*.4)/(e.isBoss?1.5:1);}else e.mTimer=1;}
    }
}

var _pv=new THREE.Vector3();
function updPickups(dt){for(var i=0;i<pickups.length;i++){var p=pickups[i];p.rotation.y+=p.userData.spin*dt*2.2;var bob=Math.sin(G.time*3+p.userData.theta*6)*.45;sPos(p.userData.theta,p.userData.phi,CFG.world.surfaceRadius+1.3+bob,_pv);p.position.copy(_pv);p.lookAt(0,0,0);}}

function checkCollisions(){
    var px=player.mesh.position.x,py=player.mesh.position.y,pz=player.mesh.position.z;
    for(var i=pickups.length-1;i>=0;i--){
        var p=pickups[i],dx=px-p.position.x,dy=py-p.position.y,dz=pz-p.position.z;
        if(dx*dx+dy*dy+dz*dz<16){
            var ptype=p.userData.pickupType;
            removePickup(p);
            G.score+=10;G.progress++;
            sfxPickup();
            // Apply typed effect
            if(ptype==='boost'){
                G.boostMeter=clamp(G.boostMeter+25,0,CFG.boost.max);
                G.shockwaveCharge=clamp(G.shockwaveCharge+12,0,100);
                if(G.shockwaveCharge>=100)G.shockwaveReady=true;
            } else if(ptype==='shield'){
                G.shieldTimer=6;
                sfxShield();
                showCM("SHIELD ONLINE");
            } else if(ptype==='repair'){
                G.health=Math.min(CFG.player.maxHealth,G.health+35);
                showCM("SYSTEM REPAIR");
            } else if(ptype==='rapidfire'){
                G.rapidFireTimer=8;
                showCM("RAPID FIRE");
            } else if(ptype==='bomb'){
                triggerBomb();
            }
            spawnPickup();
            updHUD();
            if(G.progress>=G.progressGoal)levelUp();
        }
    }
    for(var i=enemies.length-1;i>=0;i--){var e=enemies[i],dx=px-e.mesh.position.x,dy=py-e.mesh.position.y,dz=pz-e.mesh.position.z;if(dx*dx+dy*dy+dz*dz<25&&G.invincible<=0){takeDamage(25,h2s(e.col));e.health--;if(e.health<=0)destroyEnemy(i);else showCM("COLLISION!");}}
    checkWalls();
}

function updCamera(dt){
    var sf=clamp(Math.abs(player.speed)/(CFG.player.maxSpeed+CFG.boost.extraSpeed),0,1);
    _v1.copy(player.frame.up).multiplyScalar(CFG.camera.height+sf*2);
    _v2.copy(player.frame.forward).multiplyScalar(-(CFG.camera.distance+sf*9+(player.boosting?4:0)));
    _v3.copy(player.mesh.position).add(_v1).add(_v2);
    if(G.screenShake>0){var sh=G.screenShake*1.2;_v3.x+=(Math.random()-.5)*sh;_v3.y+=(Math.random()-.5)*sh;_v3.z+=(Math.random()-.5)*sh;}
    camera.position.lerp(_v3,CFG.camera.positionLerp);
    _v1.copy(player.frame.forward).multiplyScalar(8+sf*14+(player.boosting?6:0));
    _v2.copy(player.mesh.position).add(_v1);
    G.cameraLookTarget.lerp(_v2,CFG.camera.lookLerp);camera.lookAt(G.cameraLookTarget);
    camera.fov=THREE.MathUtils.lerp(camera.fov,CFG.camera.baseFov+sf*CFG.camera.speedFovBoost+(player.boosting?CFG.camera.boostFovBonus:0),4*dt);
    camera.updateProjectionMatrix();
    playerSpot.position.copy(camera.position);playerSpot.position.y+=6;playerSpot.target.position.copy(player.mesh.position);
}

function updWorldFx(dt){
    var pulse=.4+.6*(.5+.5*Math.sin(G.time*3.8));
    gridMat.opacity=.14+pulse*.11;
    var sf=clamp(Math.abs(player.speed)/(CFG.player.maxSpeed+CFG.boost.extraSpeed),0,1);
    bloomPass.strength=THREE.MathUtils.lerp(bloomPass.strength,.9+sf*.5+(player.boosting?.2:0),4*dt);
    stars.rotation.y+=dt*.01;
}

function updAudio(dt){
    if(!aOn||!aC)return;
    var sn=clamp(Math.abs(player.speed)/(CFG.player.maxSpeed+CFG.boost.extraSpeed),0,1);
    eOsc.frequency.setTargetAtTime(85+sn*185+(player.boosting?75:0),aC.currentTime,.08);
    eGain.gain.setTargetAtTime(.03+sn*.09,aC.currentTime,.08);
    eFilt.frequency.setTargetAtTime(350+sn*1200+(player.boosting?800:0),aC.currentTime,.08);
    bOsc.frequency.setTargetAtTime(180+sn*240,aC.currentTime,.08);
    bGain.gain.setTargetAtTime(player.boosting?.035:0,aC.currentTime,.05);
}

// Minimap
var mmCanvas=document.getElementById("mm");
var mmCtx=mmCanvas.getContext("2d");
var mmSize=130;

function drawMinimap(){
    var cx=mmSize/2,cy=mmSize/2,r=cx-4;
    mmCtx.clearRect(0,0,mmSize,mmSize);
    // Background circle
    mmCtx.save();
    mmCtx.beginPath();mmCtx.arc(cx,cy,r,0,Math.PI*2);
    mmCtx.fillStyle="rgba(0,8,20,0.85)";mmCtx.fill();
    // Grid rings
    mmCtx.strokeStyle="rgba(0,255,255,0.1)";mmCtx.lineWidth=1;
    [.33,.66,1].forEach(function(f){mmCtx.beginPath();mmCtx.arc(cx,cy,r*f,0,Math.PI*2);mmCtx.stroke();});
    // Cross hairs
    mmCtx.strokeStyle="rgba(0,255,255,0.07)";
    mmCtx.beginPath();mmCtx.moveTo(cx,cy-r);mmCtx.lineTo(cx,cy+r);mmCtx.stroke();
    mmCtx.beginPath();mmCtx.moveTo(cx-r,cy);mmCtx.lineTo(cx+r,cy);mmCtx.stroke();
    // Clip to circle
    mmCtx.beginPath();mmCtx.arc(cx,cy,r,0,Math.PI*2);mmCtx.clip();
    // Convert spherical to 2D: top-down projection
    function sphereToMM(theta,phi){
        var mx=cx+Math.cos(theta)*Math.sin(phi)*r;
        var my=cy+Math.cos(phi)*r;
        return {x:mx,y:my};
    }
    // Pickups - gold dots
    mmCtx.fillStyle="#ffd54a";
    for(var i=0;i<pickups.length;i++){
        var pp=sphereToMM(pickups[i].userData.theta,pickups[i].userData.phi);
        mmCtx.beginPath();mmCtx.arc(pp.x,pp.y,2,0,Math.PI*2);mmCtx.fill();
    }
    // Enemies - colored dots
    for(var i=0;i<enemies.length;i++){
        var e=enemies[i];
        var ep=sphereToMM(e.theta,e.phi);
        var ec="#"+e.col.toString(16).padStart(6,"0");
        mmCtx.fillStyle=ec;
        mmCtx.beginPath();mmCtx.arc(ep.x,ep.y,3,0,Math.PI*2);mmCtx.fill();
    }
    // Player - cyan dot, larger
    var plp=sphereToMM(player.theta,player.phi);
    mmCtx.fillStyle="#00ffff";
    mmCtx.shadowColor="#00ffff";mmCtx.shadowBlur=6;
    mmCtx.beginPath();mmCtx.arc(plp.x,plp.y,4,0,Math.PI*2);mmCtx.fill();
    mmCtx.shadowBlur=0;
    mmCtx.restore();
    // Outer ring border in theme color
    var tc=currentTheme?currentTheme.g:0x1fe0ff;
    var tr="#"+tc.toString(16).padStart(6,"0");
    mmCtx.beginPath();mmCtx.arc(cx,cy,r,0,Math.PI*2);
    mmCtx.strokeStyle=tr;mmCtx.lineWidth=1.5;mmCtx.globalAlpha=0.5;mmCtx.stroke();mmCtx.globalAlpha=1;
}

// Radar canvas
var radarCanvas=document.getElementById("radar");
var radarCtx=radarCanvas.getContext("2d");
radarCanvas.width=innerWidth;radarCanvas.height=innerHeight;

var _radarVec=new THREE.Vector3();
var _radarVec4=new THREE.Vector4();

function drawRadar(){
    radarCtx.clearRect(0,0,radarCanvas.width,radarCanvas.height);
    if(G.over)return;
    var W=radarCanvas.width,H=radarCanvas.height;
    var pad=22;
    for(var i=0;i<enemies.length;i++){
        var e=enemies[i];
        _radarVec.copy(e.mesh.position);
        // Project to NDC
        _radarVec4.set(_radarVec.x,_radarVec.y,_radarVec.z,1);
        _radarVec4.applyMatrix4(camera.matrixWorldInverse);
        _radarVec4.applyMatrix4(camera.projectionMatrix);
        var behind=_radarVec4.w<0;
        var sx=(_radarVec4.x/_radarVec4.w*.5+.5)*W;
        var sy=(-.5*_radarVec4.y/_radarVec4.w+.5)*H;
        var onScreen=!behind&&sx>pad&&sx<W-pad&&sy>pad&&sy<H-pad;
        if(onScreen)continue;
        // Determine screen edge direction
        var dx=sx-W/2,dy=sy-H/2;
        if(behind){dx=-dx;dy=-dy;}
        var ang=Math.atan2(dy,dx);
        // Clamp to screen edge
        var ex,ey;
        var absX=Math.abs(Math.cos(ang)),absY=Math.abs(Math.sin(ang));
        var scale=Math.min((W/2-pad)/absX,(H/2-pad)/absY);
        ex=W/2+Math.cos(ang)*scale;
        ey=H/2+Math.sin(ang)*scale;
        // Draw arrow triangle
        var ec="#"+e.col.toString(16).padStart(6,"0");
        radarCtx.save();
        radarCtx.translate(ex,ey);
        radarCtx.rotate(ang);
        radarCtx.fillStyle=ec;
        radarCtx.globalAlpha=0.85;
        radarCtx.shadowColor=ec;radarCtx.shadowBlur=8;
        radarCtx.beginPath();
        radarCtx.moveTo(10,0);
        radarCtx.lineTo(-6,-6);
        radarCtx.lineTo(-6,6);
        radarCtx.closePath();
        radarCtx.fill();
        radarCtx.restore();
    }
}

var hudT=0;
function animate(){
    requestAnimationFrame(animate);
    var now=performance.now(),dt=Math.min((now-G.lastTime)/1000,.05);
    G.lastTime=now;G.time+=dt;
    if(!G.over){updPlayer(dt);updEnemies(dt);updMissiles(dt);updPlayerMissiles(dt);updWalls(dt);updPickups(dt);updTrails(dt);updETrails(dt);updExp(dt);updSW(dt);updSL(dt);checkCollisions();}
    updCamera(dt);updWorldFx(dt);updAudio(dt);
    hudT+=dt;if(hudT>.05){flushHUD();hudT=0;}
    composer.render();
    drawMinimap();
    drawRadar();
}

initG();setTheme();createSpeedLines();resetPickups();resetEnemies();
player.frame=placeOS(player.mesh,player.theta,player.phi,player.heading,player.bank);
G.cameraLookTarget.copy(player.mesh.position);
showCM("FRACTAL RACERS");updHUD();animate();

window.addEventListener("resize",function(){
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);composer.setSize(innerWidth,innerHeight);
    bloomPass.setSize(Math.floor(innerWidth*.5),Math.floor(innerHeight*.5));
    radarCanvas.width=innerWidth;radarCanvas.height=innerHeight;
});
