<body>
<div id="hud">

<script>
var CFG={world:{sphereRadius:100,surfaceRadius:97.5},player:{maxSpeed:.62,reverseSpeed:.24,accelSharpness:4.2,turnSharpness:6.0,maxTurnRate:2.35,bankingAmount:1.15,bankingSharpness:6.5,maxHealth:100},boost:{max:100,drainPerSecond:26,gainPerPickup:8,extraSpeed:.45},camera:{height:10,distance:18,positionLerp:.08,lookLerp:.12,baseFov:75,speedFovBoost:12,boostFovBonus:8},game:{startProgressGoal:10,levelGoalIncrease:3},pickups:{count:12,collectDistance:4},enemies:{beginner:2,intermediate:4,expert:6,collisionDistance:5},missiles:{speed:.55,damage:18,lifeTime:5,fireInterval:{beginner:5,intermediate:3.2,expert:2}},lightWall:{damage:8,segmentLife:10,maxTotal:100},fx:{speedLineCount:150}};
var G={};
function initG(){G={time:0,lastTime:performance.now(),score:0,level:1,progress:0,progressGoal:CFG.game.startProgressGoal,health:CFG.player.maxHealth,kills:0,boostMeter:0,shieldTimer:0,shockwaveCharge:0,shockwaveReady:false,shockwaveCooldown:0,speedLines:null,cameraLookTarget:new THREE.Vector3(),over:false,invincible:0,screenShake:0};}
var keys={};

// RENDERER - key perf settings
var scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000814,.0035);
var camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.1,1500);
var renderer=new THREE.WebGLRenderer({antialias:false,powerPreference:"high-performance"});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(1); // CRITICAL: cap at 1x, not devicePixelRatio
renderer.setClearColor(0x000814);
document.body.appendChild(renderer.domElement);

// Bloom at HALF resolution - looks nearly same, 4x faster
var composer=new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene,camera));
var bloomPass=new THREE.UnrealBloomPass(new THREE.Vector2(Math.floor(innerWidth*.5),Math.floor(innerHeight*.5)),1.05,.5,.2);
composer.addPass(bloomPass);
// NO OutlinePass - extremely expensive

var worldGroup=new THREE.Group(),fxGroup=new THREE.Group(),pickupGroup=new THREE.Group(),enemyGroup=new THREE.Group(),missileGroup=new THREE.Group();
scene.add(worldGroup,fxGroup,pickupGroup,enemyGroup,missileGroup);

// Fewer, cheaper lights
scene.add(new THREE.AmbientLight(0x1a2e44,.9));
var rimLight=new THREE.DirectionalLight(0x66eaff,1.8);rimLight.position.set(40,80,30);scene.add(rimLight);
var accentLight=new THREE.PointLight(0xffcc33,.7,200);accentLight.position.set(-50,40,-30);scene.add(accentLight);
var playerSpot=new THREE.SpotLight(0xffffff,1.6,70,Math.PI/7,.5);scene.add(playerSpot,playerSpot.target);

// Sphere + reduced-segment grid
var sphereMat=new THREE.MeshPhongMaterial({color:0x000c18,emissive:0x001a2a,emissiveIntensity:.55,side:THREE.BackSide,shininess:18});
worldGroup.add(new THREE.Mesh(new THREE.SphereGeometry(CFG.world.sphereRadius,40,40),sphereMat));
var gridMat=new THREE.LineBasicMaterial({color:0x2fd6ff,transparent:true,opacity:.28});
var GS=24;
for(var gi=0;gi<=GS;gi++){var phi0=(gi/GS)*Math.PI,gp=[];for(var gj=0;gj<=60;gj++){var t0=(gj/60)*Math.PI*2;gp.push(new THREE.Vector3(CFG.world.sphereRadius*Math.sin(phi0)*Math.cos(t0),CFG.world.sphereRadius*Math.cos(phi0),CFG.world.sphereRadius*Math.sin(phi0)*Math.sin(t0)));}worldGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(gp),gridMat));}
for(var gi=0;gi<GS;gi++){var t0=(gi/GS)*Math.PI*2,gp=[];for(var gj=0;gj<=60;gj++){var p0=(gj/60)*Math.PI;gp.push(new THREE.Vector3(CFG.world.sphereRadius*Math.sin(p0)*Math.cos(t0),CFG.world.sphereRadius*Math.cos(p0),CFG.world.sphereRadius*Math.sin(p0)*Math.sin(t0)));}worldGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(gp),gridMat));}

// Stars - fewer
var sGeo=new THREE.BufferGeometry(),spArr=new Float32Array(1200*3);
for(var si=0;si<1200;si++){var r=500+Math.random()*600,a=Math.random()*Math.PI*2,b=Math.acos(2*Math.random()-1);spArr[si*3]=r*Math.sin(b)*Math.cos(a);spArr[si*3+1]=r*Math.cos(b);spArr[si*3+2]=r*Math.sin(b)*Math.sin(a);}
sGeo.setAttribute("position",new THREE.BufferAttribute(spArr,3));
var stars=new THREE.Points(sGeo,new THREE.PointsMaterial({color:0xffffff,size:1.2,transparent:true,opacity:.7}));scene.add(stars);

// Pre-allocated vectors - CRITICAL to avoid GC pressure
var _v1=new THREE.Vector3(),_v2=new THREE.Vector3(),_v3=new THREE.Vector3();
var _q1=new THREE.Quaternion(),_m1=new THREE.Matrix4(),_axZ=new THREE.Vector3(0,0,1);
// frame returned fresh each call (matches original behaviour)

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function wrapT(t){var p=Math.PI*2,r=t%p;return r<0?r+p:r;}
function h2s(h){return((h>>16)&255)+","+(((h>>8)&255))+","+(h&255);}

function sPos(theta,phi,radius,out){
    if(radius===undefined)radius=CFG.world.surfaceRadius;
    if(!out)out=new THREE.Vector3();
    return out.set(radius*Math.sin(phi)*Math.cos(theta),radius*Math.cos(phi),radius*Math.sin(phi)*Math.sin(theta));
}

function tFrame(theta,phi,heading){
    var pos=new THREE.Vector3(CFG.world.surfaceRadius*Math.sin(phi)*Math.cos(theta),CFG.world.surfaceRadius*Math.cos(phi),CFG.world.surfaceRadius*Math.sin(phi)*Math.sin(theta));
    var up=pos.clone().normalize();
    var tT=new THREE.Vector3(-Math.sin(phi)*Math.sin(theta),0,Math.sin(phi)*Math.cos(theta)).normalize();
    var tP=new THREE.Vector3(Math.cos(phi)*Math.cos(theta),-Math.sin(phi),Math.cos(phi)*Math.sin(theta)).normalize();
    var forward=tT.clone().multiplyScalar(Math.cos(heading)).add(tP.clone().multiplyScalar(Math.sin(heading))).normalize();
    var right=new THREE.Vector3().crossVectors(forward,up).normalize();
    var corrFwd=new THREE.Vector3().crossVectors(up,right).normalize();
    return {pos:pos,up:up,right:right,forward:corrFwd};
}

function placeOS(obj,theta,phi,heading,bank){
    bank=bank||0;
    var f=tFrame(theta,phi,heading);
    obj.position.copy(f.pos);
    _m1.makeBasis(f.right,f.up,f.forward);
    obj.quaternion.setFromRotationMatrix(_m1);
    if(bank!==0){
        var bq=new THREE.Quaternion().setFromAxisAngle(_axZ,bank);
        obj.quaternion.multiply(bq);
    }
    return f;
}

// POOLED PARTICLES - ring buffer, no per-frame mesh creation
// Player trail
var TP=70,tPos=new Float32Array(TP*3),tLife=new Float32Array(TP),tHead=0;
for(var i=0;i<TP;i++){tPos[i*3]=9999;tPos[i*3+1]=9999;tPos[i*3+2]=9999;}
var tGeo=new THREE.BufferGeometry();tGeo.setAttribute("position",new THREE.BufferAttribute(tPos,3));
var tMat=new THREE.PointsMaterial({color:0x00ffff,size:2.2,transparent:true,opacity:.65,sizeAttenuation:true});
scene.add(new THREE.Points(tGeo,tMat));
function addTrail(pos,boost){var i=tHead%TP;tPos[i*3]=pos.x;tPos[i*3+1]=pos.y;tPos[i*3+2]=pos.z;tLife[i]=.8;tHead++;tMat.color.set(boost?0xffcc33:0x00ffff);tGeo.attributes.position.needsUpdate=true;}
function updTrails(dt){for(var i=0;i<TP;i++){if(tLife[i]>0){tLife[i]-=dt;if(tLife[i]<=0){tPos[i*3]=9999;tPos[i*3+1]=9999;tPos[i*3+2]=9999;}}}tGeo.attributes.position.needsUpdate=true;}

// Enemy trails
var EP=50,ePos=new Float32Array(EP*3),eLife=new Float32Array(EP),eHead=0;
for(var i=0;i<EP;i++){ePos[i*3]=9999;ePos[i*3+1]=9999;ePos[i*3+2]=9999;}
var eGeo=new THREE.BufferGeometry();eGeo.setAttribute("position",new THREE.BufferAttribute(ePos,3));
scene.add(new THREE.Points(eGeo,new THREE.PointsMaterial({color:0xff3366,size:1.8,transparent:true,opacity:.5,sizeAttenuation:true})));
function addETrail(pos){var i=eHead%EP;ePos[i*3]=pos.x;ePos[i*3+1]=pos.y;ePos[i*3+2]=pos.z;eLife[i]=.6;eHead++;eGeo.attributes.position.needsUpdate=true;}
function updETrails(dt){for(var i=0;i<EP;i++){if(eLife[i]>0){eLife[i]-=dt;if(eLife[i]<=0){ePos[i*3]=9999;ePos[i*3+1]=9999;ePos[i*3+2]=9999;}}}eGeo.attributes.position.needsUpdate=true;}

// Light walls - single BufferGeometry ring buffer
var WM=CFG.lightWall.maxTotal,wPos=new Float32Array(WM*3),wLife=new Float32Array(WM),wOwner=new Uint8Array(WM),wHead=0;
var wColl=[];for(var i=0;i<WM;i++){wPos[i*3]=9999;wPos[i*3+1]=9999;wPos[i*3+2]=9999;wColl.push(new THREE.Vector3(9999,9999,9999));}
var wGeo=new THREE.BufferGeometry();wGeo.setAttribute("position",new THREE.BufferAttribute(wPos,3));
var wMat=new THREE.PointsMaterial({color:0xff3366,size:3.5,transparent:true,opacity:.8,sizeAttenuation:true});
scene.add(new THREE.Points(wGeo,wMat));
function spawnWall(pos,col,isP){var i=wHead%WM;wPos[i*3]=pos.x;wPos[i*3+1]=pos.y;wPos[i*3+2]=pos.z;wLife[i]=CFG.lightWall.segmentLife;wOwner[i]=isP?1:2;wColl[i].copy(pos);wHead++;wMat.color.set(col);wGeo.attributes.position.needsUpdate=true;}
function updWalls(dt){for(var i=0;i<WM;i++){if(wLife[i]>0){wLife[i]-=dt;if(wLife[i]<=0){wPos[i*3]=9999;wPos[i*3+1]=9999;wPos[i*3+2]=9999;wColl[i].set(9999,9999,9999);}}}wGeo.attributes.position.needsUpdate=true;}
function checkWalls(){if(G.invincible>0||G.over)return;var px=player.mesh.position.x,py=player.mesh.position.y,pz=player.mesh.position.z;for(var i=0;i<WM;i++){if(wLife[i]>0&&wOwner[i]===2){var dx=px-wColl[i].x,dy=py-wColl[i].y,dz=pz-wColl[i].z;if(dx*dx+dy*dy+dz*dz<7){takeDamage(3,"255,60,60");break;}}}}

// Explosion FX - single reused system
var XM=60,xPos=new Float32Array(XM*3),xVel=[],xLife=0;
for(var i=0;i<XM;i++){xPos[i*3]=9999;xPos[i*3+1]=9999;xPos[i*3+2]=9999;xVel.push(new THREE.Vector3());}
var xGeo=new THREE.BufferGeometry();xGeo.setAttribute("position",new THREE.BufferAttribute(xPos,3));
var xMat=new THREE.PointsMaterial({color:0xffcc33,size:1.4,transparent:true,opacity:0,sizeAttenuation:true});
scene.add(new THREE.Points(xGeo,xMat));
function spawnExp(pos,col){xMat.color.set(col);xMat.opacity=1;xLife=.9;for(var i=0;i<XM;i++){xPos[i*3]=pos.x;xPos[i*3+1]=pos.y;xPos[i*3+2]=pos.z;xVel[i].set(Math.random()*2-1,Math.random()*2-1,Math.random()*2-1).normalize().multiplyScalar(12+Math.random()*10);}xGeo.attributes.position.needsUpdate=true;}
function updExp(dt){if(xLife<=0)return;xLife-=dt;xMat.opacity=Math.max(0,xLife/.9);for(var i=0;i<XM;i++){xPos[i*3]+=xVel[i].x*dt;xPos[i*3+1]+=xVel[i].y*dt;xPos[i*3+2]+=xVel[i].z*dt;}xGeo.attributes.position.needsUpdate=true;}

// Shockwave FX - reused
var SM=100,swP=new Float32Array(SM*3),swV=[],swL=0;
for(var i=0;i<SM;i++){swP[i*3]=9999;swP[i*3+1]=9999;swP[i*3+2]=9999;swV.push(new THREE.Vector3());}
var swGeo=new THREE.BufferGeometry();swGeo.setAttribute("position",new THREE.BufferAttribute(swP,3));
var swMat=new THREE.PointsMaterial({color:0xffcc33,size:1.6,transparent:true,opacity:0,sizeAttenuation:true});
scene.add(new THREE.Points(swGeo,swMat));
var swRM=new THREE.MeshBasicMaterial({color:0xffcc33,transparent:true,opacity:0,side:THREE.DoubleSide});
var swRing=new THREE.Mesh(new THREE.TorusGeometry(4,.3,6,28),swRM);scene.add(swRing);
var swRL=0;

// Shared geometries - created ONCE
var _bGeo=new THREE.BoxGeometry(3,1.2,8),_bGeoBoss=new THREE.BoxGeometry(4.35,1.74,11.6);
var _cGeo=new THREE.BoxGeometry(2.1,.8,2.7),_wGeo=new THREE.TorusGeometry(1.15,.2,6,18),_blGeo=new THREE.CylinderGeometry(.12,.12,10,5);
var _mGeo=new THREE.SphereGeometry(.5,4,4),_pcGeo=new THREE.OctahedronGeometry(1.3,0),_phGeo=new THREE.SphereGeometry(2,6,6);
var _pcMat=new THREE.MeshPhongMaterial({color:0xffd54a,emissive:0xcc9a00,shininess:60}),_phMat=new THREE.MeshBasicMaterial({color:0xfff1a8,transparent:true,opacity:.14});
var _shGeo=new THREE.SphereGeometry(5,8,8),_shMat=new THREE.MeshBasicMaterial({color:0x00ffff,transparent:true,opacity:.09,wireframe:true});
var _VS="varying vec3 vN;varying vec3 vVP;varying vec2 vUv;void main(){vN=normalize(normalMatrix*normal);vec4 mv=modelViewMatrix*vec4(position,1.0);vVP=-mv.xyz;vUv=uv;gl_Position=projectionMatrix*mv;}";
var _FS="uniform vec3 col;uniform vec3 em;uniform float t;varying vec3 vN;varying vec3 vVP;varying vec2 vUv;void main(){vec3 v=normalize(vVP);float rim=pow(1.0-max(dot(v,vN),0.0),3.2);float s=sin(vUv.x*22.0+t*10.0)*.5+.5;gl_FragColor=vec4(col*.35+em*rim*4.0+em*s*1.3,.97);}";

function createBike(col,isBoss){
    isBoss=!!isBoss;var s=isBoss?1.45:1;var g=new THREE.Group();
    var bm=new THREE.ShaderMaterial({uniforms:{col:{value:new THREE.Color(col)},em:{value:new THREE.Color(col)},t:{value:0}},vertexShader:_VS,fragmentShader:_FS,transparent:true});
    g.add(new THREE.Mesh(isBoss?_bGeoBoss:_bGeo,bm));
    var c=new THREE.Mesh(_cGeo,new THREE.MeshPhongMaterial({color:0xffffff,emissive:col,transparent:true,opacity:.5}));c.position.set(0,.7*s,.8*s);g.add(c);
    var wm=new THREE.MeshBasicMaterial({color:col});
    [[0,-.35*s,2.7*s],[0,-.35*s,-2.7*s]].forEach(function(p){var w=new THREE.Mesh(_wGeo,wm);w.rotation.y=Math.PI/2;w.position.set(p[0],p[1],p[2]);g.add(w);});
    var bldM=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.5});
    [[-1.4*s,.1*s,0],[1.4*s,.1*s,0]].forEach(function(p){var b=new THREE.Mesh(_blGeo,bldM);b.rotation.z=Math.PI/2;b.position.set(p[0],p[1],p[2]);g.add(b);});

function updPlayer(dt){
    if(G.over)return;
    var ts=0;if(keys["ArrowUp"]||keys["KeyW"])ts=CFG.player.maxSpeed;else if(keys["ArrowDown"]||keys["KeyS"])ts=-CFG.player.reverseSpeed;
    player.boosting=false;if((keys["ShiftLeft"]||keys["ShiftRight"])&&G.boostMeter>0&&ts>0){ts+=CFG.boost.extraSpeed;player.boosting=true;G.boostMeter=clamp(G.boostMeter-CFG.boost.drainPerSecond*dt,0,CFG.boost.max);}
    player.speed=THREE.MathUtils.lerp(player.speed,ts,CFG.player.accelSharpness*dt);
    var ti=0;if(keys["ArrowLeft"]||keys["KeyA"])ti-=1;if(keys["ArrowRight"]||keys["KeyD"])ti+=1;
    player.turnVelocity=THREE.MathUtils.lerp(player.turnVelocity,ti*CFG.player.maxTurnRate,CFG.player.turnSharpness*dt);
    player.heading+=player.turnVelocity*dt;
    var tT=Math.cos(player.heading),tP=Math.sin(player.heading),lf=Math.max(.25,Math.sin(player.phi));
    player.theta+=(player.speed*tT*dt*2.75)/lf;player.phi+=player.speed*tP*dt*2.1;
    player.theta=wrapT(player.theta);player.phi=clamp(player.phi,.18,Math.PI-.18);
    player.bank=THREE.MathUtils.lerp(player.bank,clamp(-player.turnVelocity*CFG.player.bankingAmount,-.92,.92),CFG.player.bankingSharpness*dt);
    player.frame=placeOS(player.mesh,player.theta,player.phi,player.heading,player.bank);
    player.mesh.userData.bm.uniforms.t.value=G.time*(player.boosting?2:1);
    if(Math.abs(player.speed)>.04&&Math.random()<.55)addTrail(player.mesh.position,player.boosting);
    if(Math.abs(player.speed)>.3&&Math.random()<dt*3.5)spawnWall(player.mesh.position,player.boosting?0xffcc33:0x00ffff,true);
    if(keys["Space"]&&G.shockwaveReady){triggerShockwave();keys["Space"]=false;}
    if(G.shockwaveCooldown>0)G.shockwaveCooldown-=dt;else{G.shockwaveCharge=clamp(G.shockwaveCharge+dt*10,0,100);if(G.shockwaveCharge>=100){G.shockwaveReady=true;G.shockwaveCharge=100;}}
    if(G.shieldTimer>0){G.shieldTimer-=dt;shMesh.visible=true;}else{shMesh.visible=false;}
    if(G.invincible>0)G.invincible-=dt;if(G.screenShake>0)G.screenShake-=dt;
}

function updEnemies(dt){
    for(var ei=0;ei<enemies.length;ei++){
        var e=enemies[ei];
        var dT=player.theta-e.theta;if(dT>Math.PI)dT-=Math.PI*2;if(dT<-Math.PI)dT+=Math.PI*2;
        var dP=player.phi-e.phi,dH=Math.atan2(dP,dT)-e.heading;
        while(dH>Math.PI)dH-=Math.PI*2;while(dH<-Math.PI)dH+=Math.PI*2;
        var agg=1.3+G.level*.18+(diffKey()==="expert"?.4:0);
        e.heading+=dH*dt*agg;
        var ts=(e.isBoss?.22:.18)+G.level*.014+(diffKey()==="expert"?.06:0);
        e.speed=THREE.MathUtils.lerp(e.speed,ts,1.3*dt);
        var tT=Math.cos(e.heading),tP=Math.sin(e.heading),lf=Math.max(.25,Math.sin(e.phi));
        e.theta+=(e.speed*tT*dt*2.3)/lf;e.phi+=e.speed*tP*dt*1.8;
        e.theta=wrapT(e.theta);e.phi=clamp(e.phi,.2,Math.PI-.2);
        e.bank=THREE.MathUtils.lerp(e.bank,clamp(-dH*.9,-.72,.72),4.5*dt);
        placeOS(e.mesh,e.theta,e.phi,e.heading,e.bank);
        e.mesh.userData.bm.uniforms.t.value=G.time*.9;
        if(Math.random()<.15)addETrail(e.mesh.position);
        e.wTimer-=dt;if(e.wTimer<=0&&e.speed>.1){e.wTimer=.25+Math.random()*.12;spawnWall(e.mesh.position,e.col,false);}
        e.mTimer-=dt;if(e.mTimer<=0){if(e.mesh.position.distanceTo(player.mesh.position)<70){fireMissile(e);e.mTimer=mInt()*(.8+Math.random()*.4)/(e.isBoss?1.5:1);}else e.mTimer=1;}
    }
}

function checkCollisions(){

function updCamera(dt){
    var sf=clamp(Math.abs(player.speed)/(CFG.player.maxSpeed+CFG.boost.extraSpeed),0,1);
    _v1.copy(player.frame.up).multiplyScalar(CFG.camera.height+sf*2);
    _v2.copy(player.frame.forward).multiplyScalar(-(CFG.camera.distance+sf*8+(player.boosting?4:0)));

    _v1.copy(player.frame.forward).multiplyScalar(8+sf*12+(player.boosting?6:0));

    camera.fov=THREE.MathUtils.lerp(camera.fov,CFG.camera.baseFov+sf*CFG.camera.speedFovBoost+(player.boosting?CFG.camera.boostFovBonus:0),4*dt);

  <div style="position:absolute;bottom:24px;right:24px;display:flex;flex-direction:column;gap:14px;align-items:center;pointer-events:all;touch-action:none;">
    <div id="tbNova" style="width:70px;height:70px;border-radius:50%;border:2px solid rgba(255,204,51,.5);background:rgba(255,204,51,.08);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:.55rem;color:#ffcc33;letter-spacing:1px;user-select:none;">NOVA</div>
    <div id="tbBoost" style="width:70px;height:70px;border-radius:50%;border:2px solid rgba(0,255,255,.5);background:rgba(0,255,255,.08);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:.5rem;color:#00ffff;letter-spacing:1px;user-select:none;">BOOST</div>
  </div>
</div>

<script>
(function(){
  var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
  if(!isTouchDevice) return;

  document.getElementById('tc').style.display = 'block';
  var chEl = document.getElementById('ch');
  if(chEl) chEl.style.display = 'none';

  // Landscape prompt
  function checkOrientation(){
    if(window.innerHeight > window.innerWidth && window.innerWidth < 700){
      if(!document.getElementById('rotateMsg')){
        var d = document.createElement('div');
        d.id = 'rotateMsg';
        d.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,8,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Orbitron,monospace;color:#00ffff;text-align:center;padding:40px;';
        d.innerHTML = '<div style="font-size:2.5rem;margin-bottom:20px;">&#x1F504;</div><div style="font-size:.9rem;letter-spacing:3px;">ROTATE TO LANDSCAPE</div><div style="font-size:.65rem;color:rgba(255,255,255,.4);margin-top:12px;">For the best racing experience</div>';
        document.body.appendChild(d);
      }
    } else {
      var rm = document.getElementById('rotateMsg');
      if(rm) rm.remove();
    }
  }
  window.addEventListener('resize', checkOrientation);
  checkOrientation();

  // ─── VIRTUAL JOYSTICK ───
  var jCanvas = document.getElementById('tjc');
  var jCtx = jCanvas.getContext('2d');
  var jCenter = {x:90, y:90};
  var jRadius = 70;
  var jKnob = {x:90, y:90};
  var jActive = false;
  var jTouchId = null;
  var DEADZONE = 0.2;

  function drawJoystick(){
    jCtx.clearRect(0,0,180,180);
    jCtx.beginPath();
    jCtx.arc(jCenter.x, jCenter.y, jRadius, 0, Math.PI*2);
    jCtx.strokeStyle = 'rgba(0,255,255,0.3)';
    jCtx.lineWidth = 2;
    jCtx.stroke();
    jCtx.strokeStyle = 'rgba(0,255,255,0.1)';
    jCtx.lineWidth = 1;
    jCtx.beginPath(); jCtx.moveTo(jCenter.x,jCenter.y-jRadius); jCtx.lineTo(jCenter.x,jCenter.y+jRadius); jCtx.stroke();
    jCtx.beginPath(); jCtx.moveTo(jCenter.x-jRadius,jCenter.y); jCtx.lineTo(jCenter.x+jRadius,jCenter.y); jCtx.stroke();
    jCtx.beginPath();
    jCtx.arc(jKnob.x, jKnob.y, 22, 0, Math.PI*2);
    jCtx.fillStyle = jActive ? 'rgba(0,255,255,0.35)' : 'rgba(0,255,255,0.15)';
    jCtx.fill();
    jCtx.strokeStyle = 'rgba(0,255,255,0.6)';
    jCtx.lineWidth = 2;
    jCtx.stroke();
  }
  drawJoystick();

  function jGetPos(touch){
    var rect = jCanvas.getBoundingClientRect();
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  }

  function jUpdate(pos){
    var dx = pos.x - jCenter.x;
    var dy = pos.y - jCenter.y;
    var dist = Math.sqrt(dx*dx + dy*dy);
    if(dist > jRadius){ dx = dx/dist*jRadius; dy = dy/dist*jRadius; }
    jKnob.x = jCenter.x + dx;
    jKnob.y = jCenter.y + dy;
    var nx = dx / jRadius;
    var ny = dy / jRadius;
    keys['KeyA'] = nx < -DEADZONE;
    keys['KeyD'] = nx > DEADZONE;
    keys['KeyW'] = ny < -DEADZONE;
    keys['KeyS'] = ny > DEADZONE;
    drawJoystick();
  }

  function jReset(){
    jKnob.x = jCenter.x; jKnob.y = jCenter.y;
    keys['KeyA'] = false; keys['KeyD'] = false;
    keys['KeyW'] = false; keys['KeyS'] = false;
    jActive = false; jTouchId = null;
    drawJoystick();
  }

  jCanvas.addEventListener('touchstart', function(e){
    e.preventDefault();
    var t = e.changedTouches[0];
    jTouchId = t.identifier; jActive = true;
    jUpdate(jGetPos(t)); startAudio();
  }, {passive:false});

  jCanvas.addEventListener('touchmove', function(e){
    e.preventDefault();
    for(var i=0;i<e.changedTouches.length;i++){
      if(e.changedTouches[i].identifier === jTouchId) jUpdate(jGetPos(e.changedTouches[i]));
    }
  }, {passive:false});

  jCanvas.addEventListener('touchend', function(e){
    for(var i=0;i<e.changedTouches.length;i++){
      if(e.changedTouches[i].identifier === jTouchId) jReset();
    }
  });
  jCanvas.addEventListener('touchcancel', function(){ jReset(); });

  // ─── ACTION BUTTONS ───
  var boostBtn = document.getElementById('tbBoost');
  var novaBtn = document.getElementById('tbNova');

  boostBtn.addEventListener('touchstart', function(e){
    e.preventDefault(); keys['ShiftLeft'] = true;
    this.style.background = 'rgba(0,255,255,.25)'; startAudio();
  }, {passive:false});
  boostBtn.addEventListener('touchend', function(e){
    e.preventDefault(); keys['ShiftLeft'] = false;
    this.style.background = 'rgba(0,255,255,.08)';
  }, {passive:false});
  boostBtn.addEventListener('touchcancel', function(){
    keys['ShiftLeft'] = false; this.style.background = 'rgba(0,255,255,.08)';
  });

  novaBtn.addEventListener('touchstart', function(e){
    e.preventDefault(); keys['Space'] = true;
    this.style.background = 'rgba(255,204,51,.25)'; startAudio();
  }, {passive:false});
  novaBtn.addEventListener('touchend', function(e){
    e.preventDefault(); keys['Space'] = false;
    this.style.background = 'rgba(255,204,51,.08)';
  }, {passive:false});
  novaBtn.addEventListener('touchcancel', function(){
    keys['Space'] = false; this.style.background = 'rgba(255,204,51,.08)';
  });
})();
</script>
